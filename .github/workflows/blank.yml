name: CI Pipeline for Node.js

on:
  push:
    branches: [ "main" ]

jobs:
  ci-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npx eslint . --ext .js --max-warnings=0

      - name: Run tests
        run: npm test

      - name: Build package
        run: npm pack
